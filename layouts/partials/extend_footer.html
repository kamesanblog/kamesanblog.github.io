<script src="https://cdn.jsdelivr.net/npm/medium-zoom@1.0.6/dist/medium-zoom.min.js"></script>

<script>
    (function() {
        // --- 1. Header 自動隱藏邏輯 ---
        const header = document.querySelector('.header');
        let lastScrollTop = 0;
        if (header) {
            header.style.transition = "transform 0.4s ease-in-out";
            window.addEventListener('scroll', function() {
                let st = window.pageYOffset || document.documentElement.scrollTop;
                if (st > lastScrollTop && st > 80) {
                    header.style.transform = "translateY(-100%)";
                } else {
                    header.style.transform = "translateY(0)";
                }
                lastScrollTop = st <= 0 ? 0 : st;
            }, { passive: true });
        }

        // --- 2. 圖片縮放設定 ---
        document.addEventListener('DOMContentLoaded', () => {
            mediumZoom('.post-content img', {
                margin: 24,
                background: 'var(--theme)', 
                scrollOffset: 0,
            });
        });

        // --- 3. 側邊欄控制與自動定位邏輯 ---
        const toggleBtn = document.getElementById('sidebar-toggle');
        const closeBtn = document.getElementById('sidebar-close');
        const sidebar = document.getElementById('custom-sidebar');
        const overlay = document.getElementById('sidebar-overlay');

        // 自動定位到當前文章的函數
        const locateCurrentPost = () => {
            const currentUrl = window.location.pathname; 
            const allLinks = sidebar.querySelectorAll('a');
            
            allLinks.forEach(link => {
                const linkPath = new URL(link.href).pathname;
                // 檢查路徑是否匹配（排除首頁）
                if (linkPath === currentUrl && currentUrl !== '/') {
                    link.classList.add('current-active'); 
                    // 捲動至側邊欄中央
                    link.scrollIntoView({
                        behavior: 'smooth',
                        block: 'center'
                    });
                } else {
                    link.classList.remove('current-active');
                }
            });
        };

        const hideSidebar = () => {
            sidebar.classList.remove('sidebar-visible');
            overlay.classList.remove('active');
            document.body.style.overflow = ''; 
        };

        const showSidebar = () => {
            sidebar.classList.add('sidebar-visible');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden'; 
            // 延遲執行定位，等待側邊欄滑入動畫完成
            setTimeout(locateCurrentPost, 300);
        };

        if (toggleBtn) toggleBtn.addEventListener('click', showSidebar);
        if (closeBtn) closeBtn.addEventListener('click', hideSidebar);
        if (overlay) {
            overlay.addEventListener('click', hideSidebar);
            overlay.addEventListener('touchstart', hideSidebar, {passive: true});
        }
    })();
</script>
