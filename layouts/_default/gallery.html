{{ define "main" }}
<article class="post-single">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
  </header>
  
  <div class="post-content">
    <div class="masonry-gallery" id="gallery">
      {{ range .Site.RegularPages }}
        {{ $currentPage := . }}
        {{ range .Resources.ByType "image" }}
          {{ $thumb := .Resize "800x" }}
          <div class="masonry-item">
            <a href="{{ .RelPermalink }}" class="lightbox-trigger" 
               data-caption="{{ $currentPage.Title }}" 
               data-url="{{ $currentPage.RelPermalink }}">
              <img src="{{ $thumb.RelPermalink }}" alt="{{ .Name }}" loading="lazy">
              <div class="gallery-meta">
                <span>{{ $currentPage.Title }}</span>
              </div>
            </a>
          </div>
        {{ end }}
      {{ end }}
    </div>
  </div>
</article>

<div id="lightbox-modal" class="lightbox">
  <span class="close-btn">&times;</span>
  <button class="nav-btn prev-btn" id="prev-btn" aria-label="Previous">&#10094;</button>
  <div class="lightbox-wrapper">
    <img class="lightbox-content" id="lightbox-img">
    <div id="lightbox-caption"></div>
  </div>
  <button class="nav-btn next-btn" id="next-btn" aria-label="Next">&#10095;</button>
</div>

<style>
  .masonry-gallery {
    column-count: 3;
    column-gap: 4px;    
    padding: 10px 0;
    line-height: 0;    
  }
  .masonry-item {
    display: block;    
    width: 100%;
    margin-bottom: 4px; 
    position: relative;
    border-radius: 2px; 
    overflow: hidden;
    break-inside: avoid; 
  }
  .post-content .masonry-gallery a {
    box-shadow: none !important; 
    margin: 0 !important;
    padding: 0 !important;
    display: block;
  }
  @media (max-width: 600px) {
    .masonry-gallery { column-gap: 2px; }
    .masonry-item { margin-bottom: 2px; }
    .gallery-meta { font-size: 0.5rem !important; padding: 4px !important; }
  }
  .masonry-item img {
    width: 100%; height: auto; display: block;
    margin: 0 !important; padding: 0 !important;
    cursor: zoom-in; transition: filter 0.3s ease;
  }
  .masonry-item:hover img { filter: brightness(0.8); }
  .gallery-meta {
    position: absolute; bottom: 0; left: 0; right: 0; padding: 8px;
    background: linear-gradient(transparent, rgba(0,0,0,0.6));
    color: white; font-size: 0.65rem; line-height: 1.2;
    opacity: 0; transition: opacity 0.2s; pointer-events: none;
  }
  .masonry-item:hover .gallery-meta { opacity: 1; }

  .lightbox {
    display: none; position: fixed; z-index: 9999;
    top: 0; left: 0; width: 100%; height: 100%;
    background-color: rgba(0, 0, 0, 0.95);
    align-items: center; justify-content: space-between; flex-direction: row;
  }
  .lightbox-wrapper {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; max-width: 80%;
  }
  .lightbox-content {
    max-width: 100%; max-height: 80vh; object-fit: contain; user-select: none;
  }
  .nav-btn {
    background: transparent; border: none;
    color: rgba(255, 255, 255, 0.5); font-size: 50px;
    padding: 20px; cursor: pointer; margin: 0 10px;
    transition: color 0.3s, transform 0.2s; z-index: 10000;
  }
  .nav-btn:hover { color: #fff; transform: scale(1.1); }
  #lightbox-caption { margin-top: 15px; font-size: 0.9rem; line-height: 1.5; text-align: center; }
  #lightbox-caption a { color: #fff; text-decoration: underline; font-weight: bold; }
  .close-btn {
    position: absolute; top: 20px; right: 30px;
    color: #fff; font-size: 40px; font-weight: bold;
    cursor: pointer; z-index: 10001;
  }
  @media (max-width: 600px) {
    .nav-btn { display: none; }
    .lightbox-wrapper { max-width: 95%; }
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const modal = document.getElementById('lightbox-modal');
    const modalImg = document.getElementById('lightbox-img');
    const captionText = document.getElementById('lightbox-caption');
    const closeBtn = document.querySelector('.close-btn');
    const triggers = Array.from(document.querySelectorAll('.lightbox-trigger'));
    let currentIndex = 0;

    function updateLightbox(index) {
      if (index < 0) index = triggers.length - 1;
      if (index >= triggers.length) index = 0;
      currentIndex = index;
      const target = triggers[currentIndex];
      modalImg.src = target.getAttribute('href');
      const caption = target.getAttribute('data-caption');
      const url = target.getAttribute('data-url');
      captionText.innerHTML = `<a href="${url}">${caption}</a>`;
    }

    triggers.forEach((trigger, index) => {
      trigger.addEventListener('click', function(e) {
        e.preventDefault();
        modal.style.display = "flex";
        updateLightbox(index);
      });
    });

    document.getElementById('next-btn').onclick = (e) => { e.stopPropagation(); updateLightbox(currentIndex + 1); };
    document.getElementById('prev-btn').onclick = (e) => { e.stopPropagation(); updateLightbox(currentIndex - 1); };
    closeBtn.onclick = () => { modal.style.display = "none"; };
    modal.onclick = (e) => { if(e.target === modal) modal.style.display = "none"; };
    
    document.addEventListener('keydown', (e) => {
      if (modal.style.display === "flex") {
        if (e.key === "ArrowRight") updateLightbox(currentIndex + 1);
        if (e.key === "ArrowLeft") updateLightbox(currentIndex - 1);
        if (e.key === "Escape") modal.style.display = "none";
      }
    });

    let touchStartX = 0;
    modal.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, false);
    modal.addEventListener('touchend', e => {
      const touchEndX = e.changedTouches[0].screenX;
      const swipeDistance = touchEndX - touchStartX;
      if (swipeDistance < -50) updateLightbox(currentIndex + 1);
      if (swipeDistance > 50) updateLightbox(currentIndex - 1);
    }, false);
  });
</script>
{{ end }}
