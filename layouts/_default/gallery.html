{{ define "main" }}
<article class="post-single">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
  </header>
  
  <div class="post-content">
    <div class="masonry-gallery" id="gallery">
      {{ range .Site.RegularPages }}
        {{ $currentPage := . }}
        {{ range .Resources.ByType "image" }}
          {{ $thumb := .Resize "800x" }}
          <div class="masonry-item">
            {{/* 修改處：新增 data-url 來傳遞該頁面的連結 */}}
            <a href="{{ .RelPermalink }}" 
               class="lightbox-trigger" 
               data-caption="{{ $currentPage.Title }}" 
               data-url="{{ $currentPage.RelPermalink }}">
              <img src="{{ $thumb.RelPermalink }}" alt="{{ .Name }}" loading="lazy">
              <div class="gallery-meta">
                <span>{{ $currentPage.Title }}</span>
              </div>
            </a>
          </div>
        {{ end }}
      {{ end }}
    </div>
  </div>
</article>

<div id="lightbox-modal" class="lightbox">
  <span class="close-btn">&times;</span>
  <img class="lightbox-content" id="lightbox-img">
  <div id="lightbox-caption"></div>
</div>

<style>
  /* 1. 佈局核心 */
  .masonry-gallery {
    column-count: 3;
    column-gap: 4px;
    padding: 10px 0;
    line-height: 0;
  }

  .masonry-item {
    display: block;
    width: 100%;
    margin-bottom: 4px;
    position: relative;
    border-radius: 2px;
    overflow: hidden;
    break-inside: avoid;
  }

  .post-content .masonry-gallery a {
    box-shadow: none !important;
    margin: 0 !important;
    padding: 0 !important;
    display: block;
  }

  @media (max-width: 900px) { .masonry-gallery { column-count: 2; } }
  @media (max-width: 600px) { .masonry-gallery { column-count: 1; } }

  .masonry-item img {
    width: 100%;
    height: auto;
    display: block;
    margin: 0 !important;
    padding: 0 !important;
    cursor: zoom-in;
    transition: filter 0.3s ease;
  }

  .masonry-item:hover img {
    filter: brightness(0.8);
  }

  .gallery-meta {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 8px;
    background: linear-gradient(transparent, rgba(0,0,0,0.6));
    color: white;
    font-size: 0.65rem;
    line-height: 1.2;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }

  .masonry-item:hover .gallery-meta { opacity: 1; }

  /* 2. Lightbox 樣式 */
  .lightbox {
    display: none;
    position: fixed;
    z-index: 9999;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-color: rgba(0, 0, 0, 0.95);
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  .lightbox-content {
    max-width: 95%;
    max-height: 85%;
    object-fit: contain;
  }

  /* 修改處：Lightbox 下方連結的樣式 */
  #lightbox-caption {
    margin-top: 15px;
    font-size: 0.9rem;
    line-height: 1.5;
  }

  #lightbox-caption a {
    color: #fff;
    text-decoration: underline;
    font-weight: bold;
  }

  .close-btn {
    position: absolute;
    top: 20px; right: 30px;
    color: #fff;
    font-size: 40px;
    font-weight: bold;
    cursor: pointer;
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const modal = document.getElementById('lightbox-modal');
    const modalImg = document.getElementById('lightbox-img');
    const captionText = document.getElementById('lightbox-caption');
    const closeBtn = document.querySelector('.close-btn');

    document.querySelectorAll('.lightbox-trigger').forEach(trigger => {
      trigger.addEventListener('click', function(e) {
        e.preventDefault();
        modal.style.display = "flex";
        modalImg.src = this.getAttribute('href');
        
        // 修改處：抓取標題與網址，並組合成超連結
        const caption = this.getAttribute('data-caption');
        const url = this.getAttribute('data-url');
        captionText.innerHTML = `<a href="${url}">${caption}</a>`;
      });
    });

    closeBtn.onclick = () => { modal.style.display = "none"; };
    modal.onclick = (e) => { if(e.target === modal) modal.style.display = "none"; };
    
    document.addEventListener('keydown', (e) => {
      if (e.key === "Escape") modal.style.display = "none";
    });
  });
</script>
{{ end }}
