{{ define "main" }}
<article class="post-single">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
  </header>
  
  <div class="post-content">
    <div class="masonry-gallery" id="gallery">
      {{ range .Site.RegularPages }}
        {{ $currentPage := . }}
        {{ range .Resources.ByType "image" }}
          {{ $thumb := .Resize "800x" }}
          <div class="masonry-item">
            {{/* 1. 修改：加入 data-url 傳遞連結 */}}
            <a href="{{ .RelPermalink }}" class="lightbox-trigger" 
               data-caption="{{ $currentPage.Title }}" 
               data-url="{{ $currentPage.RelPermalink }}">
              <img src="{{ $thumb.RelPermalink }}" alt="{{ .Name }}" loading="lazy">
              <div class="gallery-meta">
                <span>{{ $currentPage.Title }}</span>
              </div>
            </a>
          </div>
        {{ end }}
      {{ end }}
    </div>
  </div>
</article>

<div id="lightbox-modal" class="lightbox">
  <span class="close-btn">&times;</span>
  <img class="lightbox-content" id="lightbox-img">
  <div id="lightbox-caption"></div>
</div>

<style>
  /* 1. 佈局核心 - 修改：移除 @media 欄數切換，強制 3 欄 */
  .masonry-gallery {
    column-count: 3;    /* 強制電腦、平板、手機皆為 3 欄 */
    column-gap: 4px;    
    padding: 10px 0;
    line-height: 0;    
  }

  .masonry-item {
    display: block;    
    width: 100%;
    margin-bottom: 4px; 
    position: relative;
    border-radius: 2px; 
    overflow: hidden;
    break-inside: avoid; 
  }

  .post-content .masonry-gallery a {
    box-shadow: none !important; 
    margin: 0 !important;
    padding: 0 !important;
    display: block;
  }

  /* 調整手機端的微小間距與字體，讓比例更協調 */
  @media (max-width: 600px) {
    .masonry-gallery {
      column-gap: 2px;
    }
    .masonry-item {
      margin-bottom: 2px;
    }
    .gallery-meta {
      font-size: 0.5rem !important;
      padding: 4px !important;
    }
  }

  .masonry-item img {
    width: 100%;
    height: auto;
    display: block;      
    margin: 0 !important;
    padding: 0 !important;
    cursor: zoom-in;
    transition: filter 0.3s ease;
  }

  .masonry-item:hover img {
    filter: brightness(0.8);
  }

  .gallery-meta {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 8px;
    background: linear-gradient(transparent, rgba(0,0,0,0.6));
    color: white;
    font-size: 0.65rem;
    line-height: 1.2;    
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }

  .masonry-item:hover .gallery-meta { opacity: 1; }

  /* 2. Lightbox 樣式 - 修改：優化連結顯示 */
  .lightbox {
    display: none;
    position: fixed;
    z-index: 9999;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-color: rgba(0, 0, 0, 0.95);
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  .lightbox-content {
    max-width: 95%;
    max-height: 80vh; /* 留一點空間給下方的連結 */
    object-fit: contain;
  }

  #lightbox-caption {
    margin-top: 15px;
    font-size: 0.9rem;
    line-height: 1.5;
    text-align: center;
  }

  #lightbox-caption a {
    color: #fff;
    text-decoration: underline;
    font-weight: bold;
  }

  .close-btn {
    position: absolute;
    top: 20px; right: 30px;
    color: #fff;
    font-size: 40px;
    font-weight: bold;
    cursor: pointer;
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const modal = document.getElementById('lightbox-modal');
    const modalImg = document.getElementById('lightbox-img');
    const captionText = document.getElementById('lightbox-caption');
    const closeBtn = document.querySelector('.close-btn');

    document.querySelectorAll('.lightbox-trigger').forEach(trigger => {
      trigger.addEventListener('click', function(e) {
        e.preventDefault();
        modal.style.display = "flex";
        modalImg.src = this.getAttribute('href');
        
        // 2. 修改：取得標題與 URL，並組合成 HTML 連結
        const caption = this.getAttribute('data-caption');
        const url = this.getAttribute('data-url');
        captionText.innerHTML = `<a href="${url}">${caption}</a>`;
      });
    });

    closeBtn.onclick = () => { modal.style.display = "none"; };
    modal.onclick = (e) => { if(e.target === modal) modal.style.display = "none"; };
    
    document.addEventListener('keydown', (e) => {
      if (e.key === "Escape") modal.style.display = "none";
    });
  });
</script>
{{ end }}
