{{ define "main" }}
<article class="post-single">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
  </header>
  
  <div class="post-content">
    <div class="masonry-gallery" id="gallery">
      {{ range .Site.RegularPages }}
        {{ $currentPage := . }}
        {{ range .Resources.ByType "image" }}
          {{ $thumb := .Resize "800x" }}
          <div class="masonry-item">
            <a href="{{ .RelPermalink }}" 
               class="lightbox-trigger" 
               data-caption="{{ $currentPage.Title }}" 
               data-url="{{ $currentPage.RelPermalink }}">
              <img src="{{ $thumb.RelPermalink }}" alt="{{ .Name }}" loading="lazy">
              <div class="gallery-meta">
                <span>{{ $currentPage.Title }}</span>
              </div>
            </a>
          </div>
        {{ end }}
      {{ end }}
    </div>
  </div>
</article>

<div id="lightbox-modal" class="lightbox">
  <span class="close-btn">&times;</span>
  <img class="lightbox-content" id="lightbox-img">
  <div id="lightbox-caption"></div>
</div>

<style>
  /* 1. 基礎佈局 (電腦端) */
  .masonry-gallery {
    column-count: 3;
    column-gap: 8px;    /* 電腦端間距稍微加大 */
    padding: 10px 0;
    line-height: 0;
  }

  /* 2. iPad / 平板優化 (螢幕 1024px 以下) */
  @media (max-width: 1024px) {
    .masonry-gallery {
      column-count: 3;  /* iPad 建議維持 3 欄比較精緻 */
      column-gap: 6px;
    }
  }

  /* 3. 手機優化 (螢幕 600px 以下) */
  @media (max-width: 600px) {
    .masonry-gallery {
      column-count: 2;  /* 手機強制 2 欄，才有 Minimal 的密鋪感 */
      column-gap: 4px;  /* 縮小間距，增加圖片顯示面積 */
    }
    .gallery-meta {
      font-size: 0.5rem; /* 手機端文字縮小 */
      padding: 4px;
    }
  }

  .masonry-item {
    display: block;
    width: 100%;
    margin-bottom: 8px; /* 電腦端上下間距 */
    position: relative;
    border-radius: 2px;
    overflow: hidden;
    break-inside: avoid;
  }

  /* 手機端上下間距同步縮小 */
  @media (max-width: 600px) {
    .masonry-item {
      margin-bottom: 4px; 
    }
  }

  /* 移除主題預設樣式 */
  .post-content .masonry-gallery a {
    box-shadow: none !important;
    margin: 0 !important;
    padding: 0 !important;
    display: block;
  }

  .masonry-item img {
    width: 100%;
    height: auto;
    display: block;
    cursor: zoom-in;
    transition: filter 0.3s ease;
  }

  .gallery-meta {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 8px;
    background: linear-gradient(transparent, rgba(0,0,0,0.6));
    color: white;
    font-size: 0.65rem;
    line-height: 1.2;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }

  .masonry-item:hover .gallery-meta { opacity: 1; }

  /* 4. Lightbox 行動端優化 */
  .lightbox {
    display: none;
    position: fixed;
    z-index: 9999;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-color: rgba(0, 0, 0, 0.95);
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  .lightbox-content {
    max-width: 95%;
    max-height: 80vh; /* 限制高度，留空間給文字 */
    object-fit: contain;
  }

  #lightbox-caption {
    margin-top: 15px;
    font-size: 0.9rem;
    padding: 0 20px;
    text-align: center;
  }

  #lightbox-caption a {
    color: #fff;
    text-decoration: underline;
  }

  .close-btn {
    position: absolute;
    top: 10px; right: 20px; /* 行動端位置稍微調整 */
    color: #fff;
    font-size: 35px;
    cursor: pointer;
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const modal = document.getElementById('lightbox-modal');
    const modalImg = document.getElementById('lightbox-img');
    const captionText = document.getElementById('lightbox-caption');
    const closeBtn = document.querySelector('.close-btn');

    document.querySelectorAll('.lightbox-trigger').forEach(trigger => {
      trigger.addEventListener('click', function(e) {
        e.preventDefault();
        modal.style.display = "flex";
        modalImg.src = this.getAttribute('href');
        const caption = this.getAttribute('data-caption');
        const url = this.getAttribute('data-url');
        captionText.innerHTML = `<a href="${url}">${caption}</a>`;
      });
    });

    closeBtn.onclick = () => { modal.style.display = "none"; };
    modal.onclick = (e) => { if(e.target === modal) modal.style.display = "none"; };
    document.addEventListener('keydown', (e) => {
      if (e.key === "Escape") modal.style.display = "none";
    });
  });
</script>
{{ end }}
