{{/* 新增：文章左右滑動導覽功能 */}}
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // 獲取 Hugo 產生的導覽連結 (來自 post_nav_links.html)
      const prevLink = document.querySelector('.prev a');
      const nextLink = document.querySelector('.next a');

      let touchStartX = 0;
      let touchEndX = 0;

      // 監聽觸摸開始
      document.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
      }, {passive: true});

      // 監聽觸摸結束
      document.addEventListener('touchend', e => {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
      }, {passive: true});

      function handleSwipe() {
        const swipeDistance = touchEndX - touchStartX;
        const threshold = 100; // 滑動超過 100 像素才觸發

        // 向右滑動 (指尖從左往右移動) -> 看上一篇 (Prev)
        if (swipeDistance > threshold && prevLink) {
          window.location.href = prevLink.href;
        }
        
        // 向左滑動 (指尖從右往左移動) -> 看下一篇 (Next)
        if (swipeDistance < -threshold && nextLink) {
          window.location.href = nextLink.href;
        }
      }
    });
  </script>
