
<div class="callout {{ .Get "type" | default "note" }}">
    <div class="callout-title">
        {{ .Get "title" | default (.Get "type" | humanize) }}
    </div>
    <div class="callout-content">
        {{ .Inner | markdownify }}
    </div>
</div>

<div class="callout {{ .Get "type" }}">
  {{ .Inner | markdownify }}
</div>
